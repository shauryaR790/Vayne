services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vayne
      POSTGRES_PASSWORD: vayne
      POSTGRES_DB: vayne
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn vayne.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vayne:vayne@postgres:5432/vayne
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A vayne.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://vayne:vayne@postgres:5432/vayne
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

volumes:
  pgdata:
